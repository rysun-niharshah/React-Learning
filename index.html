<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      public/ assets are referenced by absolute path (/vite.svg).
      They are copied as-is to dist/ and never processed by the bundler.
    -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Vite Tailwind Template</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Entry script uses type="module" — Vite's dev server and build both
      rely on native ES modules for fast HMR and tree-shaking.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
